<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registrar producto</title>
<link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <header>
    <input id="input" type="text" placeholder="Busqueda" oninput="busqueda()" />

    <nav>
      <a href="index.html">tieda</a>
      <a href="#" onclick="cofigurarTema('Ligth')">carrito</a>
      <a href="#" onclick="cofigurarTema('Dark')">producto</a>
      <a href="#" onclick="cofigurarTema('Blue')">usuario</a>
      <a href="despacho.html">Despachos</a>
    </nav>
  </header>

  <main id="productos">
    <h1>Registrar producto</h1>
    <p class="subtitulo">Completa los datos del producto para agregarlo al catálogo.</p>

    <form id="form-producto" novalidate>

      <div class="campo">
        <label for="nombre">Nombre del producto</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Camisa de lino azul" required />
        <div class="error-campo" id="error-nombre"></div>
      </div>

      <div class="fila-doble">
        <div class="campo">
          <label for="valor">Valor (RD$)</label>
          <input type="number" id="valor" name="valor" placeholder="0.00" min="0" step="0.01" required />
          <div class="error-campo" id="error-valor"></div>
        </div>

        <div class="campo">
          <label for="cantidad">Cantidad disponible</label>
          <input type="number" id="cantidad" name="cantidad" placeholder="0" min="0" step="1" required />
          <div class="error-campo" id="error-cantidad"></div>
        </div>
      </div>

      <div class="campo">
        <label for="descripcion">Descripción <span class="opcional">(opcional)</span></label>
        <textarea id="descripcion" name="descripcion" placeholder="Detalles del producto: talla, material, color, etc."></textarea>
      </div>

      <div class="campo">
        <label>Imágenes del producto</label>
        <label class="zona-imagenes" id="zona-imagenes">
          <input type="file" id="imagenes" name="imagenes" accept="image/*" multiple />
          <span class="principal">Haz clic para elegir imágenes</span>
          <span class="secundaria">Puedes seleccionar varias · JPG o PNG</span>
        </label>
        <div class="previsualizacion" id="previsualizacion"></div>
        <div class="error-campo" id="error-imagenes"></div>
      </div>

      <button type="submit" id="btn-guardar">Guardar producto</button>
      <div class="mensaje-estado" id="mensaje-estado"></div>
    </form>
  </main>

  <script src="./js/productos.js"></script>
</body>
</html>
